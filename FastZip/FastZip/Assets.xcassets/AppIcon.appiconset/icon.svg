<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角方形 -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- 金色钥匙 -->
  <g transform="translate(512,440) rotate(-20)" fill="none" stroke="#FBBF24" stroke-width="56" stroke-linecap="round" stroke-linejoin="round">
    <!-- 钥匙环 -->
    <circle cx="0" cy="-160" r="120"/>
    <!-- 钥匙杆 -->
    <line x1="0" y1="-40" x2="0" y2="280"/>
    <!-- 钥匙齿 -->
    <line x1="0" y1="200" x2="70" y2="160"/>
    <line x1="0" y1="240" x2="70" y2="200"/>
    <line x1="0" y1="200" x2="60" y2="240"/>
  </g>
  <!-- 拉链标签 F -->
  <g transform="translate(480,630)">
    <text font-family="system-ui,sans-serif" font-weight="800" font-size="200" fill="#60A5FA" text-anchor="middle">F</text>
  </g>
</svg>
